name: Looker Screenshot to Telegram

on:
  schedule: 

  # รันมือได้จาก GitHub Actions tab
  workflow_dispatch:
    inputs:
      chat_id:
        description: "Telegram chat_id ที่จะส่งภาพหา (ถ้าว่างจะส่งหา TELEGRAM_CHAT_ID default)"
        required: false
        default: ""

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run screenshot
        env:
          TZ: Asia/Bangkok          # ✅ เพิ่มบรรทัดนี้
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ inputs.chat_id || secrets.TELEGRAM_CHAT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TARGET_URL_1:          ${{ secrets.TARGET_URL_1 }}
          TARGET_URL_2:          ${{ secrets.TARGET_URL_2 }}
          TARGET_URL_3:          ${{ secrets.TARGET_URL_3 }}
        run: python screenshot_to_telegram.py
